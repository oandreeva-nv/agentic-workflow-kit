<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1120" viewBox="0 0 1200 1120" role="img" aria-labelledby="title desc">
  <title id="title">Claude + Codex Framework Development Loop</title>
  <desc id="desc">Lifecycle diagram showing Claude-led design and review handoffs to Codex execution and validation across discover, spec, plan review, implementation, adversarial review, final validation, ship, and reflect phases.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 30px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #536075; }
      .lane-title { font: 700 18px Arial, sans-serif; fill: #172033; }
      .phase { font: 700 13px Arial, sans-serif; fill: #5f6b7d; letter-spacing: 0.4px; }
      .card-title { font: 700 15px Arial, sans-serif; fill: #172033; }
      .card-body { font: 400 13px Arial, sans-serif; fill: #334155; }
      .step { font: 700 12px Arial, sans-serif; fill: #ffffff; }
      .claude-card { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.5; }
      .codex-card { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.5; }
      .ship-card { fill: #f0fdf4; stroke: #22c55e; stroke-width: 1.5; }
      .lane { fill: #ffffff; stroke: #d8dee9; stroke-width: 1; }
      .phase-line { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 4 6; }
      .arrow { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#arrowhead); }
      .badge-claude { fill: #ea580c; }
      .badge-codex { fill: #2563eb; }
      .badge-ship { fill: #16a34a; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="1120" rx="0" />
  <text class="title" x="70" y="58">Claude + Codex Framework Development Loop</text>
  <text class="subtitle" x="70" y="84">Design - Review - Implement - Validate - Ship - Reflect</text>

  <rect class="lane" x="70" y="118" width="480" height="930" rx="8" />
  <rect class="lane" x="650" y="118" width="480" height="930" rx="8" />
  <text class="lane-title" x="260" y="148" text-anchor="middle">Claude</text>
  <text class="subtitle" x="260" y="170" text-anchor="middle">interactive design, challenge, reviews, decisions</text>
  <text class="lane-title" x="890" y="148" text-anchor="middle">Codex</text>
  <text class="subtitle" x="890" y="170" text-anchor="middle">repo scan, implementation, tests, validation evidence</text>

  <line class="phase-line" x1="70" y1="240" x2="1130" y2="240" />
  <line class="phase-line" x1="70" y1="355" x2="1130" y2="355" />
  <line class="phase-line" x1="70" y1="540" x2="1130" y2="540" />
  <line class="phase-line" x1="70" y1="665" x2="1130" y2="665" />
  <line class="phase-line" x1="70" y1="805" x2="1130" y2="805" />
  <line class="phase-line" x1="70" y1="935" x2="1130" y2="935" />

  <text class="phase" x="88" y="222">DISCOVER / SCOPE</text>
  <text class="phase" x="88" y="337">SPEC / VALIDATE</text>
  <text class="phase" x="88" y="522">PLAN REVIEW</text>
  <text class="phase" x="88" y="647">IMPLEMENT / CHECKPOINT</text>
  <text class="phase" x="88" y="787">ADVERSARIAL REVIEW</text>
  <text class="phase" x="88" y="917">FINAL VALIDATION</text>
  <text class="phase" x="88" y="1030">SHIP / LEARN</text>

  <!-- Step cards -->
  <g id="step-1">
    <rect class="claude-card" x="135" y="190" width="350" height="76" rx="8" />
    <circle class="badge-claude" cx="162" cy="218" r="15" /><text class="step" x="162" y="222" text-anchor="middle">1</text>
    <text class="card-title" x="188" y="213">Superpowers brainstorming</text>
    <text class="card-body" x="188" y="236">generate /idea-hours</text>
  </g>
  <g id="step-2">
    <rect class="codex-card" x="715" y="190" width="350" height="76" rx="8" />
    <circle class="badge-codex" cx="742" cy="218" r="15" /><text class="step" x="742" y="222" text-anchor="middle">2</text>
    <text class="card-title" x="768" y="213">Repo/project scan</text>
    <text class="card-body" x="768" y="236">map files, tests, constraints</text>
  </g>
  <g id="step-3">
    <rect class="claude-card" x="135" y="305" width="350" height="76" rx="8" />
    <circle class="badge-claude" cx="162" cy="333" r="15" /><text class="step" x="162" y="337" text-anchor="middle">3</text>
    <text class="card-title" x="188" y="328">DAE / framework spec</text>
    <text class="card-body" x="188" y="351">ready contract, ACs, Gherkin</text>
  </g>
  <g id="step-4">
    <rect class="codex-card" x="715" y="305" width="350" height="76" rx="8" />
    <circle class="badge-codex" cx="742" cy="333" r="15" /><text class="step" x="742" y="337" text-anchor="middle">4</text>
    <text class="card-title" x="768" y="328">Validate spec against repo</text>
    <text class="card-body" x="768" y="351">check fit, gaps, test surface</text>
  </g>
  <g id="step-5">
    <rect class="claude-card" x="135" y="425" width="350" height="76" rx="8" />
    <circle class="badge-claude" cx="162" cy="453" r="15" /><text class="step" x="162" y="457" text-anchor="middle">5</text>
    <text class="card-title" x="188" y="448">gstack plan reviews</text>
    <text class="card-body" x="188" y="471">/plan-eng-review, /plan-devex-review</text>
  </g>
  <g id="step-6">
    <rect class="claude-card" x="135" y="515" width="350" height="76" rx="8" />
    <circle class="badge-claude" cx="162" cy="543" r="15" /><text class="step" x="162" y="547" text-anchor="middle">6</text>
    <text class="card-title" x="188" y="538">Superpowers write-plans</text>
    <text class="card-body" x="188" y="561">reviewable implementation sequence</text>
  </g>
  <g id="step-7">
    <rect class="codex-card" x="715" y="425" width="350" height="76" rx="8" />
    <circle class="badge-codex" cx="742" cy="453" r="15" /><text class="step" x="742" y="457" text-anchor="middle">7</text>
    <text class="card-title" x="768" y="448">Translate plan to test status</text>
    <text class="card-body" x="768" y="471">red/green targets, validation matrix</text>
  </g>
  <g id="step-8">
    <rect class="codex-card" x="715" y="515" width="350" height="76" rx="8" />
    <circle class="badge-codex" cx="742" cy="543" r="15" /><text class="step" x="742" y="547" text-anchor="middle">8</text>
    <text class="card-title" x="768" y="538">TDD implementation</text>
    <text class="card-body" x="768" y="561">incremental patch steps</text>
  </g>
  <g id="step-9">
    <rect class="claude-card" x="135" y="635" width="350" height="76" rx="8" />
    <circle class="badge-claude" cx="162" cy="663" r="15" /><text class="step" x="162" y="667" text-anchor="middle">9</text>
    <text class="card-title" x="188" y="658">Review diff / checkpoint</text>
    <text class="card-body" x="188" y="681">scope, risk, implementation quality</text>
  </g>
  <g id="step-10">
    <rect class="codex-card" x="715" y="635" width="350" height="76" rx="8" />
    <circle class="badge-codex" cx="742" cy="663" r="15" /><text class="step" x="742" y="667" text-anchor="middle">10</text>
    <text class="card-title" x="768" y="658">Continue implementation</text>
    <text class="card-body" x="768" y="681">address checkpoint findings</text>
  </g>
  <g id="step-11">
    <rect class="claude-card" x="135" y="755" width="350" height="76" rx="8" />
    <circle class="badge-claude" cx="162" cy="783" r="15" /><text class="step" x="162" y="787" text-anchor="middle">11</text>
    <text class="card-title" x="188" y="778">Adversarial framework review</text>
    <text class="card-body" x="188" y="801">API, compat, lifecycle, abuse</text>
  </g>
  <g id="step-12">
    <rect class="codex-card" x="715" y="755" width="350" height="76" rx="8" />
    <circle class="badge-codex" cx="742" cy="783" r="15" /><text class="step" x="742" y="787" text-anchor="middle">12</text>
    <text class="card-title" x="768" y="778">Fix findings and validate</text>
    <text class="card-body" x="768" y="801">tests, linters, benchmarks as needed</text>
  </g>
  <g id="step-13">
    <rect class="claude-card" x="135" y="875" width="350" height="76" rx="8" />
    <circle class="badge-claude" cx="162" cy="903" r="15" /><text class="step" x="162" y="907" text-anchor="middle">13</text>
    <text class="card-title" x="188" y="898">Compatibility / perf / security</text>
    <text class="card-body" x="188" y="921">docs and release review</text>
  </g>
  <g id="step-14">
    <rect class="codex-card" x="715" y="875" width="350" height="76" rx="8" />
    <circle class="badge-codex" cx="742" cy="903" r="15" /><text class="step" x="742" y="907" text-anchor="middle">14</text>
    <text class="card-title" x="768" y="898">Final patch summary</text>
    <text class="card-body" x="768" y="921">validation evidence and residual risk</text>
  </g>
  <g id="step-15">
    <rect class="ship-card" x="135" y="995" width="350" height="76" rx="8" />
    <circle class="badge-ship" cx="162" cy="1023" r="15" /><text class="step" x="162" y="1027" text-anchor="middle">15</text>
    <text class="card-title" x="188" y="1018">Ship readiness</text>
    <text class="card-body" x="188" y="1041">gstack /ship or finish branch</text>
  </g>
  <g id="step-16">
    <rect class="ship-card" x="715" y="995" width="350" height="76" rx="8" />
    <circle class="badge-ship" cx="742" cy="1023" r="15" /><text class="step" x="742" y="1027" text-anchor="middle">16</text>
    <text class="card-title" x="768" y="1018">Reflect and update</text>
    <text class="card-body" x="768" y="1041">AGENTS.md / skills when reusable</text>
  </g>

  <!-- Arrows -->
  <path class="arrow" d="M485,228 C575,228 625,228 715,228" />
  <path class="arrow" d="M890,266 L890,305" />
  <path class="arrow" d="M715,343 C625,343 575,343 485,343" />
  <path class="arrow" d="M310,381 L310,425" />
  <path class="arrow" d="M310,501 L310,515" />
  <path class="arrow" d="M485,553 C575,553 625,463 715,463" />
  <path class="arrow" d="M890,501 L890,515" />
  <path class="arrow" d="M715,553 C625,553 575,673 485,673" />
  <path class="arrow" d="M485,673 C575,673 625,673 715,673" />
  <path class="arrow" d="M890,711 L890,755" />
  <path class="arrow" d="M715,793 C625,793 575,793 485,793" />
  <path class="arrow" d="M485,793 C575,793 625,793 715,793" />
  <path class="arrow" d="M890,831 L890,875" />
  <path class="arrow" d="M715,913 C625,913 575,913 485,913" />
  <path class="arrow" d="M485,913 C575,913 625,913 715,913" />
  <path class="arrow" d="M890,951 L890,995" />
  <path class="arrow" d="M715,1033 C625,1033 575,1033 485,1033" />
  <path class="arrow" d="M485,1033 C575,1033 625,1033 715,1033" />
</svg>
